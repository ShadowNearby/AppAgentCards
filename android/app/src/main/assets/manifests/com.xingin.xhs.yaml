spec_version: "0.1"
card_version: "0.1.0"
app_id: "com.xingin.xhs"
app_name: "小红书"
platforms: ["android"]
locale: ["zh-CN"]

embedded_agent:
  name: "小红书 问ai"
  type: smart_search
  description: >
    Xiaohongshu's AI-augmented search mode. A RAG-over-UGC content discovery
    assistant — does not book, order, or hail. Aggregates answers at the top
    of search results as "AI summary + embedded POI labels + source notes"
    followed by the standard note feed. All capabilities are executable=false.

  entry:
    primary:
      method: tap_sequence
      steps:
        # Top-right search button on home screen. Only visible from main tabs
        # (Home/Market/Messages/Profile); may be obscured in immersive video player.
        - tap: { accessibility_id: "搜索" }
        # Switch from default text search to "问ai" mode.
        # ImageView content-desc is "问ai"; sibling TextView also "问ai".
        # Neither clickable — tap-through on parent LinearLayout per §6.1.
        - tap: { accessibility_id: "问ai" }
    fallback: []
    preconditions:
      # App-wide mandatory login; home screen shows login sheet blocking search if not logged in.
      - type: login_required

  invocation:
    input:
      # EditText resource-id is "0_resource_name_obfuscated" (ProGuard, shared
      # across elements). text is "搜索, ", hint cycles through trending topics.
      # Only reliable selector is bounds. See OQ-11.
      field:
        x_bounds:
          box: [158, 184, 891, 299]
          anchor: top_left
      max_chars: 200
    submit:
      # Top-right "搜索" Button in search page — stable text selector.
      trigger: { text: "搜索" }
    prompt_template: "{{user_prompt}}"

  output:
    method: none

  capabilities:

    - id: qa_community_knowledge
      description: >
        RAG Q&A over Xiaohongshu UGC content. Covers lifestyle domains:
        travel, parenting, fashion, food, learning, fitness, beauty.
        Output is an AI summary (with POI labels and recommendations) +
        source note feed. Agent never places orders or triggers payments.
        Route here for "find tips/recommendations/guides" intents, not "buy/book/order".
      example_prompts:
        - "周末上海带娃去哪玩"
        - "新手怎么学油画"
        - "200块以内的春装搭配"
        - "上海有什么小众咖啡馆"
      executable: false
      side_effects: []
      requires_login: true
      reversible: true
      handoff_to_user_required: false
      typical_latency_seconds: 22
      failure_modes:
        - "Query too specific or non-lifestyle → AI summary may not appear; only note feed returned"
        - "Note feed content is algorithm-driven; may not strongly correlate with AI summary"

provenance:
  last_verified: "2026-05-19"
  verified_app_version: "9.29.0"
  verified_os: "android-16"
  verified_device: "Pixel 9"
  verification_method: scripted
  evidence_url: ""
  x_device_metrics:
    resolution_px: [1080, 2424]
    density_dpi: 420

constraints:
  app_version_min: "9.29.0"
  region: ["CN"]
  network_required: true
  known_issues:
    - "AI mode is non-sticky: closing search resets to text mode. entry.steps must always tap '问ai'."
    - "'问ai' and '拍照搜' are mutually exclusive radio modes; image queries out of scope for v0.1."
    - "Separate '问一问' entry exists in search results sidebar — different surface, not covered by this card."
    - "EditText resource-id obfuscated by ProGuard to '0_resource_name_obfuscated', shared across elements. Bounds only; resolution-sensitive. See OQ-11."
    - "AI summary sources are UGC notes, not general LLM knowledge; OS router should not treat answers as authoritative cross-domain (e.g. medical/legal)."
