spec_version: "0.1"
card_version: "0.1.1"
app_id: "ctrip.android.view"
app_name: "携程旅行"
platforms: ["android"]
locale: ["zh-CN"]

embedded_agent:
  name: "携程问道"
  type: native_in_app_agent
  description: >
    Ctrip's travel AI assistant, launched from the persistent bottom input
    "Ask AI or hold to talk". Covers flights, hotels, trains, attraction
    tickets, package tours, and travel Q&A. First-party platform — no partner
    OAuth friction, but agent-wide mandatory Ctrip login. Built-in task-specific
    modes activate automatically by query complexity.

  entry:
    primary:
      method: tap_sequence
      steps:
        # Persistent bottom AI entry placeholder TextView on home tab.
        # Tap-through to parent clickable region opens half-sheet.
        # Only visible on home tab; if on other tab, router must return home first.
        - tap: { text: "问AI或按住说话" }
    fallback: []
    preconditions:
      - type: login_required

  invocation:
    input:
      # Current version no longer exposes the old EditText resource-id.
      # Placeholder TextView text is stable; tap-through per §6.1 triggers parent input focus.
      field: { text: "任何旅游相关问题都可以问我哦" }
      max_chars: 1000
    submit:
      # Send button is an ImageView with only content-desc="image"; bounds as fallback.
      trigger:
        x_bounds:
          box: [947, 2242, 1005, 2296]
          anchor: bottom_right
    prompt_template: "{{user_prompt}}"

  output:
    method: none

  capabilities:

    - id: chat_travel_qa
      description: >
        Travel Q&A: destination tips, local info (weather, visa, transport),
        attraction details, travel tips. No purchase intent; text/table output
        only. Complex queries auto-activate deep-think + RAG.
      example_prompts:
        - "上海迪士尼明天的门票多少钱"
        - "三亚十一期间天气和穿衣建议"
      executable: false
      side_effects: []
      requires_login: true
      reversible: true
      handoff_to_user_required: false
      typical_latency_seconds: 20

    - id: search_flight
      description: >
        Natural-language flight search. Returns flight cards (airline, times,
        price, cabin) with "See more flights >" CTA into native booking flow
        (CRN/React Native) for seat selection, passenger info, and Ctrip payment.
        Auto-activates deep-think.
      example_prompts:
        - "帮我找下周一上海到北京下午的机票"
        - "明天最便宜的虹桥飞成都的航班"
      executable: true
      side_effects:
        - payment
      requires_login: true
      reversible: false
      handoff_to_user_required: true
      typical_latency_seconds: 25
      failure_modes:
        - "City/time ambiguous → agent asks for clarification"

    - id: search_hotel
      description: >
        Natural-language hotel search. Parses city, district, price range,
        dates, guests. Confirms filters in chat, provides "Explore >" CTA
        into native hotel search (CRN) for room selection, booking, payment.
      example_prompts:
        - "上海外滩附近800元以内的酒店明晚入住"
        - "周末北京三里屯有湾景的酒店"
      executable: true
      side_effects:
        - payment
      requires_login: true
      reversible: false
      handoff_to_user_required: true
      typical_latency_seconds: 20

    - id: search_train
      description: >
        Natural-language train ticket search. Returns train cards (number,
        duration, price, seat availability) with "See all >" CTA into native
        booking flow. Auto-activates deep-think. 12306 ticketing handled by
        Ctrip backend; OS router does not see 12306 auth.
      example_prompts:
        - "周五早上8点北京到天津的高铁"
        - "明天去苏州最早的车次"
      executable: true
      side_effects:
        - payment
      requires_login: true
      reversible: false
      handoff_to_user_required: true
      typical_latency_seconds: 18

    - id: plan_trip
      description: >
        Multi-day trip planning. Unlike freeform itineraries, Ctrip maps
        "plan N-day trip" to packaged tour products (private/group/semi-guided
        SKU cards with rating, sales count, starting price). User taps card
        for product details and checkout. No text itinerary output.
      example_prompts:
        - "我想十一去三亚玩四天怎么安排"
        - "暑假带孩子去云南怎么玩"
      executable: true
      side_effects:
        - payment
      requires_login: true
      reversible: false
      handoff_to_user_required: true
      typical_latency_seconds: 25
      failure_modes:
        - "Destination/duration ambiguous → agent asks for clarification"
        - "Same intent across multiple turns may return different SKUs due to follow-up suggestions"

    - id: search_attraction_info
      description: >
        Attraction info: ticket prices, hours, visitor policies, nearby tips.
        Returns text and tables via deep-think + RAG. Does not sell tickets
        directly; agent may follow up with "Buy tickets now?" as second step.
      example_prompts:
        - "上海迪士尼乐园的开放时间和票价"
        - "故宫淡季票价是多少"
      executable: false
      side_effects: []
      requires_login: true
      reversible: true
      handoff_to_user_required: false
      typical_latency_seconds: 25

provenance:
  last_verified: "2026-05-19"
  verified_app_version: "8.91.6"
  verified_os: "android-16"
  verified_device: "Pixel 9"
  verification_method: scripted
  evidence_url: ""
  x_device_metrics:
    resolution_px: [1080, 2424]
    density_dpi: 420

constraints:
  app_version_min: "8.91.0"
  region: ["CN"]
  network_required: true
  known_issues:
    - "Mandatory Ctrip login; tapping send while logged out triggers login sheet. Task terminates if user cancels."
    - "AI entry only visible on home tab. If on other tab, router must tap 'Home' first (not covered by this manifest)."
    - "Task-specific modes (deep-think, PK, hotel compare, photo, menu translate) auto-activate; router should not switch them manually."
    - "Booking CTAs navigate to CRNBaseActivityV2 (React Native flow). User stays in app, but agent chat history is no longer visible."
    - "Train ticketing via Ctrip backend → 12306; user sees no 12306 login (unlike Qianwen manifest's 12306 password gate)."
    - "Input area no longer exposes legacy resource-id; use placeholder tap-through."
    - "Send button has no unique a11y metadata (cd='image' only); bounds fallback, resolution-sensitive."
    - "Agent name '携程问道' in title bar (resource_id=gs_wendaodialog_view_new) can serve as 'AI panel is open' anchor."
