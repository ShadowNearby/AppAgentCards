spec_version: "0.1"
card_version: "0.1.0"
app_id: "com.aliyun.tongyi"
app_name: "通义千问"
platforms: ["android"]
locale: ["zh-CN"]

embedded_agent:
  name: "千问"
  type: native_in_app_agent
  description: >
    Alibaba's Tongyi Qianwen App — the entire app is an AI agent surface.
    Built-in orchestration layer routes intents (train/food/ride/hotel/movie)
    to Alibaba partner apps (Fliggy, Taobao Flash, Amap, Damai) via OAuth.
    Three auth tiers affect completion semantics; see OQ-12.

  entry:
    primary:
      method: tap_sequence
      steps: []
    fallback: []
    x_prepare_fresh_conversation:
      description: >
        Start a new conversation before real-device tests to avoid stale context.
      steps:
        - tap_screen_fraction:
            label: "open_left_menu"
            x_ratio: 0.075
            y_ratio: 0.10
        - tap_label:
            text_or_desc: "新建对话"
            timeout_seconds: 0.5
            scroll_attempts: 0
        - wait:
            until: { text: "发消息或按住说话..." }
            timeout_seconds: 0.5

  invocation:
    input:
      # EditText has no resource-id; tap-through on placeholder TextView sibling.
      field: { text: "发消息或按住说话..." }
      max_chars: 2000
    submit:
      # Same FrameLayout: empty → "+", has text → send arrow. No a11y metadata; bounds-only. See OQ-11.
      trigger:
        x_bounds:
          box: [916, 2094, 1027, 2205]
          anchor: bottom_right
    prompt_template: "{{user_prompt}}"

  output:
    method: none

  capabilities:

    - id: chat
      description: >
        General Q&A and conversation. Pure LLM response, no partner calls.
      example_prompts:
        - "讲讲二战中的中途岛海战"
        - "用 Python 写一个二分查找"
      executable: false
      side_effects: []
      requires_login: false
      reversible: true
      handoff_to_user_required: false
      typical_latency_seconds: 8

    - id: book_train
      description: >
        Search and book train tickets via Fliggy. Agent lists trains in cards;
        user taps "Book" CTA → 12306 login in embedded WebView.
        Fliggy OAuth is pre-authorized at app level, but 12306 requires
        manual password entry each session (service_credential tier). See OQ-12.
      example_prompts:
        - "帮我买明天下午两点左右去南京的高铁"
        - "周五早上 8 点上海到杭州的二等座票"
      executable: true
      side_effects:
        - payment
      requires_login: true
      reversible: false
      handoff_to_user_required: true
      typical_latency_seconds: 20
      failure_modes:
        - "12306 not logged in → stops at login sheet; user must enter credentials"
        - "Fliggy returns no results → asks for time range clarification"
      x_partner_app: "com.taobao.trip"
      x_partner_service: "12306"
      x_partner_auth: "service_credential"

    - id: order_food
      description: >
        Order food delivery via Taobao Flash. First use triggers OAuth bind
        modal; once authorized, agent recommends items and triggers checkout
        with stored preferences and address.
      example_prompts:
        - "我想点份附近的外卖"
        - "晚上点份麻辣烫, 30 块以内"
        - "帮我点三杯蜜雪冰城蜜桃四季春"
      executable: true
      side_effects:
        - payment
      requires_login: true
      reversible: false
      handoff_to_user_required: true
      typical_latency_seconds: 8
      failure_modes:
        - "OAuth bind required on first use; flow terminates if user declines"
      x_partner_app: "com.taobao.litetao"
      x_partner_auth: "oauth_bind_required"
      x_post_result_flow:
        description: >
          After recommendations appear: pick default item and default spec,
          stop before payment confirmation. Accept defaults for temp/sugar options.
        steps:
          - tap_label:
              text_or_desc: "选这个"
              timeout_seconds: 1
              scroll_attempts: 2
          - tap_label:
              text_or_desc: "选好了"
              timeout_seconds: 0.3
              scroll_attempts: 0
          - wait:
              ms: 3000
        stop_before:
          - "支付宝付款"

    - id: hail_ride
      description: >
        Hail a ride via Amap. Amap OAuth pre-authorized by default.
        Agent asks for origin/destination if missing, then car type →
        estimate → payment via Alipay. Same underlying service as
        com.autonavi.minimap manifest; OS router should route based on context.
      example_prompts:
        - "帮我叫个车回家"
        - "叫一辆经济型车去虹桥机场"
      executable: true
      side_effects:
        - payment
      requires_login: true
      reversible: false
      handoff_to_user_required: true
      typical_latency_seconds: 12
      failure_modes:
        - "Missing origin/destination → agent asks for clarification"
        - "Alipay balance insufficient → payment password prompt"
      x_partner_app: "com.autonavi.minimap"
      x_partner_auth: "oauth_preauthorized"

    - id: book_hotel
      description: >
        Search and book hotels via Fliggy. OAuth pre-authorized, no login
        friction. Agent recommends options with address/rating/price in cards;
        user taps CTA → Fliggy booking flow → Alipay payment.
      example_prompts:
        - "帮我在上海订一晚酒店明天入住"
        - "明晚北京三里屯附近 500 以内的酒店"
      executable: true
      side_effects:
        - payment
      requires_login: true
      reversible: false
      handoff_to_user_required: true
      typical_latency_seconds: 18
      failure_modes:
        - "No results or sold out → agent asks to expand search criteria"
      x_partner_app: "com.taobao.trip"
      x_partner_auth: "oauth_preauthorized"

    - id: book_movie
      description: >
        Buy movie tickets via Damai. First use triggers OAuth bind modal
        (phone number selection); once authorized, agent searches showtimes,
        selects seats, and purchases.
      example_prompts:
        - "帮我买今晚上海的电影票"
        - "周六下午看哪吒, 选两张连座"
      executable: true
      side_effects:
        - payment
      requires_login: true
      reversible: false
      handoff_to_user_required: true
      typical_latency_seconds: 15
      failure_modes:
        - "OAuth bind required on first use; flow terminates if user declines"
        - "Damai not in static auth management list; partner pool is runtime-expanded"
      x_partner_app: "cn.damai"
      x_partner_auth: "oauth_bind_required"

provenance:
  last_verified: "2026-05-11"
  verified_app_version: "6.9.1.2875"
  verified_os: "android-16"
  verified_device: "Pixel 9"
  verification_method: scripted
  evidence_url: ""
  x_device_metrics:
    resolution_px: [1080, 2424]
    density_dpi: 420

constraints:
  app_version_min: "6.9.0"
  region: ["CN"]
  network_required: true
  known_issues:
    - "Main UI exposes no resource-ids — EditText, send btn, mode toggles all rely on placeholder text or bounds."
    - "Send button and '+' are the same FrameLayout; no a11y metadata, bounds-only."
    - "Auth management page lists 7 partners, but Damai (movies) works too — partner pool expands at runtime."
    - "Agent auto-detects intent type without mode switch; OS router does not need to select mode."
    - "12306 auth (book_train) is service_credential tier — requires password every session even with Fliggy authorized. See OQ-12."
    - "First-time OAuth bind modal requires user to tap 'Authorize'; declining terminates the task."
    - "x_partner_app / x_partner_service / x_partner_auth are v0.1 extensions (x_ prefix); v0.2 plans to promote. See OQ-12."
