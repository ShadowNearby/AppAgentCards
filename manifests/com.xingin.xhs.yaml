spec_version: "0.1"
card_version: "0.2.0"
app_id: "com.xingin.xhs"
app_name: "小红书"
platforms: ["android"]
locale: ["zh-CN"]

embedded_agent:
  name: "点点"
  type: smart_search
  description: >
    点点 — Xiaohongshu's in-app AI assistant. RAG-over-UGC conversational
    helper for lifestyle discovery: trip planning, "种草" summarization,
    local-life recommendations. Replies are structured chat messages with
    embedded note/POI cards (title, address, hours, photos, map).
    Does NOT book, order, or hail. All capabilities are executable=false.

  entry:
    primary:
      method: tap_sequence
      steps:
        # Top-left menu icon on home (any main tab: 首页/市集/消息/我).
        # ImageView, clickable, content-desc="菜单", bounds [24,183,119,278]
        # at 1080×2424. Tapping it lands DIRECTLY in the 点点 chat — there
        # is no intermediate drawer despite the parent being a DrawerLayout.
        - tap: { accessibility_id: "菜单" }
    fallback: []
    preconditions:
      # App-wide mandatory login; home screen shows login sheet otherwise.
      - type: login_required
      # 点点 must already be in text-input mode (EditText visible at the
      # bottom). The first 点点 session after install opens in push-to-talk
      # mode ("按住说话") — toggle once manually via the bottom-left icon;
      # the choice persists across app restarts. The mode toggle is NOT
      # idempotent, so the card cannot tap it automatically.
      - type: x_text_input_mode_required

  invocation:
    input:
      # EditText resource-id obfuscated to "0_resource_name_obfuscated"
      # (shared across elements per §6.1). Bounds-only selector at this
      # resolution. Hint text "给点点发消息..." not used as anchor.
      # NOTE: these are the pre-focus (natural) bounds. Once focused, the
      # ADB Keyboard banner pushes the EditText up to ~[42,2022,1080,2090],
      # but the focus tap fires BEFORE that shift, so target natural pos.
      field:
        x_bounds:
          box: [184, 2211, 938, 2279]
          anchor: top_left
      max_chars: 500
    submit:
      # Green up-arrow send button at bottom-right of the input row.
      # ImageView with no text or content-desc; bounds-only.
      trigger:
        x_bounds:
          box: [975, 2142, 1038, 2205]
          anchor: top_left
    prompt_template: "{{user_prompt}}"

  output:
    method: none

  capabilities:

    - id: qa_community_knowledge
      description: >
        Conversational Q&A grounded in Xiaohongshu UGC notes. Covers
        lifestyle domains: travel, parenting, fashion, food, learning,
        fitness, beauty, local探店. Reply renders as an AI text answer
        plus inline POI/note cards (address, hours, photos, mini-map).
        Route here for "find tips / recommendations / guides / 种草 / 行程"
        intents — NOT for "buy / book / order / 下单".
      example_prompts:
        - "上海有什么小众咖啡馆"
        - "周末上海带娃去哪玩"
        - "新手怎么学油画"
        - "帮我规划一个三天的成都行程"
        - "200块以内的春装搭配"
      executable: false
      side_effects: []
      requires_login: true
      reversible: true
      handoff_to_user_required: false
      typical_latency_seconds: 25
      # 点点 replies often stack 3-5 POI cards plus a header summary that
      # exceed one viewport. After the VLM signals done, the adapter scrolls
      # back through the message (MW direction="down" reveals content above)
      # and concatenates per-frame text into _last_agent_reply.
      x_capture_full_reply:
        max_scrolls: 6
      failure_modes:
        - "Query too specific or non-lifestyle → 点点 may return a generic deflection with no POI cards"
        - "First-time use may prompt for microphone/camera permission since voice mode is the default surface"
        - "Cards are algorithm-curated; recommendations can be stale (closed venues, outdated hours)"

provenance:
  last_verified: "2026-05-25"
  verified_app_version: "9.29.0"
  verified_os: "android-16"
  verified_device: "Pixel-class 1080×2424"
  verification_method: scripted
  evidence_url: ""
  x_device_metrics:
    resolution_px: [1080, 2424]
    density_dpi: 420

constraints:
  app_version_min: "9.29.0"
  region: ["CN"]
  network_required: true
  known_issues:
    - "Conversation is sticky across closes: tapping 菜单 again restores prior chat instead of starting fresh. No in-UI 'new chat' button; force-stop or scroll-up to reset is the only reliable way."
    - "Default input surface on first run is push-to-talk (按住说话). Bottom-left ImageView toggles voice↔text but is NOT idempotent — preference persists across app restarts, so the card requires text mode as a precondition rather than tapping the toggle."
    - "EditText and send button have obfuscated resource-id '0_resource_name_obfuscated' and no text/content-desc; both selectors are bounds-only and resolution-sensitive (calibrated for 1080×2424)."
    - "Top-right '...' opens 设置/历史对话/关于点点 — settings, not a new-chat action."
    - "Drawer (left edge swipe) and 点点 chat share the same trigger element; the 'menu' icon opens 点点 directly, NOT the user-profile drawer."
