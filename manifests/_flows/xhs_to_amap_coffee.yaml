spec_version: "0.1"
flow_version: "0.1.0"
flow_id: "xhs_to_amap_coffee"
description: >
  Two-app cowork: ask Xiaohongshu's 点点 to recommend niche cafes, let the
  user pick one, then ask Amap's AI assistant to hail a ride there. Each
  sub-step is a single capability invocation on one app card; routing is
  skipped (we pin the capability_id directly).

apps_required:
  - app_id: com.xingin.xhs
    use_capability: qa_community_knowledge
  - app_id: com.autonavi.minimap
    use_capability: hail_ride

inputs:
  topic:
    type: string
    default: "上海小众咖啡馆"
  city:
    type: string
    default: "上海"
  max_choices:
    type: int
    default: 5

steps:
  - id: discover
    app: com.xingin.xhs
    capability: qa_community_knowledge
    prompt: "{topic}，推荐 {max_choices} 家，只要店名和所在区，每家一行"
    extract:
      prompt: |
        从下面的推荐文本中抽取咖啡馆列表，返回 JSON 数组，每项形如
        {"name": "<店名>", "district": "<所在区，例如 静安、徐汇>"}。
        若文本里没有明确的区，district 留空字符串。最多 {max_choices} 项。
      bind_to_array_key: candidates
    bind: candidates

  - id: choose
    type: ask_user
    select_from: candidates
    item_label: "{name}（{district}）"
    prompt_header: "点点推荐了这些，挑一家（编号或店名）："
    bind: chosen

  - id: ride
    app: com.autonavi.minimap
    capability: hail_ride
    prompt: "打车去{chosen.name}（{city}{chosen.district}）"
