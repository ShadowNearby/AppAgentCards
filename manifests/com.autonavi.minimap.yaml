spec_version: "0.1"
card_version: "0.1.0"
app_id: "com.autonavi.minimap"
app_name: "高德地图"
platforms: ["android"]
locale: ["zh-CN"]

embedded_agent:
  name: "高德 AI 助手"
  type: native_in_app_agent
  description: >
    Amap's bottom-center "Press to Talk" tab hosts a built-in AI assistant
    supporting text and voice. Excels at nearby POI search, route planning
    (with one-tap "Navigate" CTA), ride hailing, and multi-day trip planning.
    Travel and local-life scenarios only; explicitly refuses out-of-domain actions.

  entry:
    primary:
      method: tap_sequence
      steps:
        # Bottom-center tab. resource_id "tab_name_v2" shared across 5 tabs;
        # v0.1 single-field selectors can't express "resource_id + text" AND. See OQ-10.
        - tap: { text: "长按说话" }
        - wait: { ms: 300 }
        # The AI tab opens in voice ("按住说话") mode on first install. The
        # hint text "有什么问题尽管问我" is only present in text mode, so
        # treat it as the probe — if absent, tap the keyboard glyph at the
        # bottom-right of the input row to flip. The toggle is stateful
        # across restarts but NOT idempotent, so we use a one-shot
        # conditional tap rather than an unconditional one.
        - tap_unless_present:
            probe: { text: "有什么问题尽管问我" }
            target:
              x_bounds:
                box: [946, 2101, 1009, 2164]
                anchor: bottom_right
        - wait: { ms: 300 }
    fallback: []

  invocation:
    input:
      # EditText has no resource-id or content-desc. When unfocused, both
      # `text` and `hint` carry "有什么问题尽管问我"; once tapped, `text`
      # empties out, so the hint-text selector ONLY works pre-focus.
      # x_bounds is the robust path; the text selector is kept as a hint
      # for matchers that want a semantic anchor.
      field:
        x_bounds:
          box: [68, 2105, 925, 2160]
          anchor: bottom_left
        text: "有什么问题尽管问我"
      max_chars: 500
    submit:
      # Same ViewGroup: empty → mic icon, has text → send arrow.
      # No id, no content-desc; bounds-only. See OQ-11.
      trigger:
        x_bounds:
          box: [946, 2075, 1009, 2138]
          anchor: bottom_right
    prompt_template: "{{user_prompt}}"

  output:
    method: none

  capabilities:
    - id: find_nearby
      description: >
        Find nearby POIs (shops, restaurants, gas stations, attractions).
        Returns list and map markers. Display only; no auto-navigation or ordering.
      example_prompts:
        - "搜附近24小时便利店"
        - "附近有什么加油站"
      executable: false
      side_effects: []
      requires_login: false
      reversible: true
      handoff_to_user_required: false
      typical_latency_seconds: 5
      x_capture_full_reply:
        max_scrolls: 6

    - id: navigate_to
      description: >
        Plan a route to destination. Returns distance, ETA, traffic info,
        and a green "Navigate" CTA button. Agent does not auto-start navigation;
        OS router must not tap the CTA — user may want to switch mode or compare routes.
      example_prompts:
        - "导航到上海外滩"
        - "我现在去虹桥机场要多久"
      executable: true
      side_effects: []
      requires_login: false
      reversible: true
      handoff_to_user_required: true
      typical_latency_seconds: 8
      failure_modes:
        - "Destination ambiguous → agent asks for more details"

    - id: hail_ride
      description: >
        Order a ride via Amap's aggregator. Multi-step: disambiguate drop-off →
        choose car type → confirm estimate → pay. Each step user-operated
        within the agent's response card.
      example_prompts:
        - "叫一辆经济型车去虹桥机场"
        - "打个车回家"
      executable: true
      side_effects:
        - payment
      requires_login: true
      reversible: false
      handoff_to_user_required: true
      typical_latency_seconds: 10
      # The first VLM "done" reading is often the transient "找到N篇资料"
      # search-spinner state, not the rendered ride-hailing card. Keep
      # polling/scrolling past that to capture the actual destination
      # confirmation + car-type panel before handing back to the user.
      x_capture_full_reply:
        max_scrolls: 3
      failure_modes:
        - "Multi-terminal airports → drop-off disambiguation panel"
        - "Not logged in → redirects to login page"

    - id: plan_trip
      description: >
        Generate multi-day travel itineraries with attraction/dining/hotel
        suggestions and map previews. Informational only; does not book anything.
        Uses deep-search mode; expect 30–60s latency.
      example_prompts:
        - "帮我规划三亚3日游"
        - "周末上海周边亲子游怎么安排"
      executable: false
      side_effects: []
      requires_login: false
      reversible: true
      handoff_to_user_required: false
      typical_latency_seconds: 40
      x_capture_full_reply:
        max_scrolls: 8
      failure_modes:
        - "Deep-search mode takes 30–60s; set generous UI timeout"

provenance:
  last_verified: "2026-05-11"
  verified_app_version: "16.16.0.2001"
  verified_os: "android-16"
  verified_device: "Pixel 9"
  verification_method: scripted
  evidence_url: ""
  x_device_metrics:
    resolution_px: [1080, 2424]
    density_dpi: 420

constraints:
  app_version_min: "16.16.0"
  region: ["CN"]
  network_required: true
  known_issues:
    - "Entry tab text says 'Press to Talk' (voice-oriented) but also accepts text input."
    - "Input field and send/mic button have no accessibility id or content-desc; selectors rely on hint text and absolute bounds."
    - "AI tab defaults to voice mode (按住说话) on first install; the keyboard toggle that flips it to text mode is non-idempotent and stateful across restarts. See entry.preconditions.x_text_input_mode_required."
    - "Send button and mic are the same ViewGroup: empty input shows mic, text shows send arrow."
    - "Secondary taps inside agent response cards may not respond to scripted clicks during TTS playback. User manual taps unaffected."
    - "Home screen card 'Call me' is a chat prompt, not actual phone call support — agent refuses dialing requests."
